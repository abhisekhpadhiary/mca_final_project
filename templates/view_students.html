{% extends "base.html" %}
{% block title %}Students{% endblock %}

{% block content %}

<div class="page">

  <div class="page-header">
    <h2>Students List</h2>
    <p>All students from your college</p>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>College</th>
        </tr>
      </thead>

      <tbody>
        {% for s in students %}
        <tr>
          <td>{{ s.username }}</td>
          <td>{{ s.email }}</td>
          <td>{{ s.college_name }}</td>
        </tr>
        {% else %}
        <tr>
          <td colspan="3" style="text-align:center;">No students found</td>
        </tr>
        {% endfor %}
      </tbody>

    </table>
  </div>

  <br>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline">← Back</a>

</div>

{% endblock %}
